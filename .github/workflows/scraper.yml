name: GSE Daily Scraper

on:
  schedule:
    - cron: '0 22 * * 1-5'   # Runs at 10:00 PM UTC, Monday to Friday
  workflow_dispatch:           # Allows you to run it manually from GitHub anytime

jobs:
  scrape:
    runs-on: ubuntu-latest

    steps:
      # 1. Check out your repository (downloads all your files onto the server)
      - name: Checkout repository
        uses: actions/checkout@v4

      # 2. Set up Python
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      # 3. Install Chrome and ChromeDriver (needed for Selenium)
      - name: Install Chrome
        uses: browser-actions/setup-chrome@v1

      # 4. Install Python dependencies
      - name: Install dependencies
        run: pip install selenium pandas

      # 5. Run the scraper
      - name: Run scraper
        run: python main.py

      # 6. Save the updated Data.csv back to the repository
      - name: Commit and push updated Data.csv
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add Data.csv scraper.log
          git diff --staged --quiet || git commit -m "Auto update: GSE data $(date +'%Y-%m-%d')"
          git push
