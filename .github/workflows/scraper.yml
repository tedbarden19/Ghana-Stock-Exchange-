name: GSE Daily Scrape

on:
  schedule:
    - cron: "0 18 * * 1-5"   # Run ~18:00 UTC (after Ghana market close)
  workflow_dispatch:

permissions:
  contents: write

jobs:
  scrape:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install Chrome & deps
        run: |
          sudo apt-get update && sudo apt-get install -y chromium-chromedriver
          pip install selenium pandas
      - name: Run scraper
        run: python main.py
      - name: Commit & push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add Data.csv scraper.log
          git diff --quiet --cached || git commit -m "Update GSE data $(date -u +'%Y-%m-%d')"
          git push
