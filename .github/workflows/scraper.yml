name: GSE Daily Scrape

on:
  schedule:
    - cron: "0 8 * * *"   # adjust to your desired UTC time
  workflow_dispatch:        # lets you trigger it manually to test

permissions:
  contents: write   # needed so the workflow can commit Data.csv back

jobs:
  scrape:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Chrome
        uses: browser-actions/setup-chrome@v1

      - name: Install Python dependencies
        run: |
          pip install selenium pandas

      - name: Run scraper
        run: python scraper.py

      - name: Commit updated data
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add Data.csv scraper.log
          git diff --quiet --cached || git commit -m "Update GSE data $(date -u +'%Y-%m-%d')"
          git push
